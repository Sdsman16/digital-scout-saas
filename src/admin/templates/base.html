<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Dashboard — Digital Scout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #0d1117; color: #e6edf3; }

    /* ── Header ── */
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    header .brand { display: flex; align-items: center; gap: 0.75rem; }
    header h1 { color: #58a6ff; font-size: 1rem; font-weight: 600; }
    .header-right { display: flex; gap: 1.25rem; align-items: center; }
    .header-right a { color: #8b949e; text-decoration: none; font-size: 0.85rem; }
    .header-right a:hover { color: #e6edf3; }
    .header-right a.active { color: #58a6ff; }

    /* ── Two-column layout ── */
    .layout { display: flex; min-height: calc(100vh - 57px); }

    /* ── Sidebar ── */
    .sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid #21262d; padding: 1.25rem 1rem; }
    .sidebar-section { margin-bottom: 1.5rem; }
    .sidebar-title { font-size: 0.65rem; color: #6e7681; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; font-weight: 700; }
    .filter-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .filter-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: background 0.1s; font-size: 0.82rem; color: #c9d1d9; text-decoration: none; }
    .filter-item:hover { background: #21262d; }
    .filter-item.active { background: #1f6feb22; color: #58a6ff; }
    .filter-item input[type="checkbox"] { accent-color: #238636; width: 14px; height: 14px; cursor: pointer; }
    .filter-count { margin-left: auto; font-size: 0.7rem; color: #6e7681; }

    .filter-section-title { font-size: 0.72rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin: 1rem 0 0.4rem; padding-bottom: 0.25rem; border-bottom: 1px solid #21262d; }

    /* ── Main content ── */
    .main { flex: 1; padding: 1.25rem 1.5rem; min-width: 0; }

    /* ── State filter tabs ── */
    .state-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items:center; }
    .state-tabs a { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; text-decoration: none; color: #8b949e; border: 1px solid #30363d; transition: all 0.15s; white-space: nowrap; }
    .state-tabs a:hover { border-color: #58a6ff; color: #58a6ff; }
    .state-tabs a.active { background: #1f6feb22; border-color: #1f6feb; color: #58a6ff; }

    /* ── Lead count ── */
    .section-label { font-size: 0.7rem; color: #6e7681; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }

    /* ── Lead row ── */
    .lead-row { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1rem 1.25rem; text-decoration: none; display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items:center; transition:border-color 0.15s; margin-bottom: 0.75rem; }
    .lead-row:hover { border-color: #58a6ff; }
    .lead-row.has-h2s { border-left: 3px solid #f85149; }
    .lead-row.has-hp { border-left: 3px solid #f0b429; }

    /* ── Risk flags ── */
    .flag { display: inline-block; border-radius: 4px; padding: 2px 6px; font-size: 0.68rem; font-weight: 700; }
    .flag-hp { background: #f0b42922; border: 1px solid #f0b429; color: #f0b429; }
    .flag-h2s { background: #f8514922; border: 1px solid #f85149; color: #f85149; }
    .flag-dir { background: #1f6feb22; border: 1px solid #1f6feb; color: #58a6ff; }
    .flag-pre { background: #23863622; border: 1px solid #238636; color: #3fb950; }
    .flag-new { background: #23863622; border: 1px solid #238636; color: #3fb950; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 4rem 2rem; color: #8b949e; }
    .empty p { font-size: 0.95rem; margin-bottom: 0.5rem; }
    .empty small { font-size: 0.8rem; color: #6e7681; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #21262d; padding: 1rem; }
      .filter-group { flex-direction: row; flex-wrap: wrap; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Digital Scout</h1>
    <a href="/dashboard" class="{{ 'active' if request.path == '/dashboard' else '' }}">Leads</a>
    <a href="/correlated" class="{{ 'active' if request.path == '/correlated' else '' }}">Correlated</a>
    <a href="/account" class="{{ 'active' if request.path == '/account' else '' }}">Account</a>
  </div>
  <div class="header-right">
    <span style="font-size:0.8rem;color:#8b949e">{{ current_user.email }}</span>
    <a href="/logout">Sign Out</a>
  </div>
</header>

<div class="layout">
  {% block sidebar %}{% endblock %}
  <div class="main">
    {% block content %}{% endblock %}
  </div>
</div>

<script>
// Collapsible sidebar sections
document.querySelectorAll('.filter-section-title').forEach(function(title) {
  title.style.cursor = 'pointer';
  title.nextElementSibling.style.transition = 'max-height 0.2s ease-out';
  title.onclick = function() {
    var content = title.nextElementSibling;
    if (content.style.display === 'none') {
      content.style.display = 'flex';
    } else {
      content.style.display = 'none';
    }
  };
});
</script>
</body>
</html>
